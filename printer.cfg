[include mainsail.cfg]
[include timelapse.cfg]

# Hoverfly - Ender 3 Pro, SKR Mini E3 V2.0, dual Z (series-wired, single driver),
# Sprite Extruder Pro (direct drive), CRTouch probe.
# See README.md in this repo for hardware history / Marlin fallback config.

[mcu]
# Fill in once printer is connected via USB (Step 4):
# ls /dev/serial/by-id/*  ->  paste the result below
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_30FFDC054754343035551557-if00

[printer]
kinematics: cartesian
max_velocity: 300           # Maximum velocity (in mm/s) of the toolhead (relative to the print). This value may be changed at runtime using the SET_VELOCITY_LIMIT command.
max_accel: 3000             # 400 might be a conservative value, but it works!
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5


[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
# Homing uses the CRTouch probe exclusively (matches your Marlin
# USE_PROBE_FOR_Z_HOMING setup) - no physical Z endstop is wired.
endstop_pin: probe:z_virtual_endstop
# -4 gives enough downward travel for PROBE_CALIBRATE (CRTouch triggers
# above the nozzle, so calibration needs to jog into negative Z).
position_min: -4
position_max: 250

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
full_steps_per_rotation: 200
# Calibrated via "measure and trim" (100mm commanded -> 100.01mm actual,
# converged over 3 passes: 4.637 -> 8.153 -> 7.501).
rotation_distance: 7.501
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
# PLACEHOLDER - Marlin PID values do NOT transfer to Klipper (different PWM
# scaling/loop timing). Run PID_CALIBRATE HEATER=extruder in Step 5.
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 290              # Sprite Extruder Pro rated 300C; 290 keeps margin

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
#control: pid
# PLACEHOLDER - run PID_CALIBRATE HEATER=heater_bed in Step 5.
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: -30
y_offset: -40
# PLACEHOLDER - always start probes at z_offset: 0.0 and calibrate fresh
# with PROBE_CALIBRATE in Step 5. Never reuse a Marlin Z-offset directly.
#z_offset: 0.0
samples: 2
speed: 3
sample_retract_dist: 3.0

[safe_z_home]
# (X_BED_SIZE-10)/2, (Y_BED_SIZE-10)/2 from your Marlin Z_SAFE_HOMING config
home_xy_position: 100, 100
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_screws]
# Real screw positions, found by jogging the nozzle directly over each
# screw and reading toolhead position (2026-07-08). This is the PRIMARY
# (and only viable) leveling tool for this printer: probe-based
# SCREWS_TILT_CALCULATE is geometrically impossible here because the
# CRTouch's -30/-40 offset puts the probe off the bed for the front
# screws and the nozzle off the back edge for the rear screws. Use
# BED_SCREWS_ADJUST with a 0.10mm feeler gauge instead.
screw1: 26.0, 40.0
screw1_name: front left
screw2: 197.0, 40.0
screw2_name: front right
screw3: 197.0, 211.0
screw3_name: back right
screw4: 27.0, 211.0
screw4_name: back left
horizontal_move_z: 10

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 190, 190
probe_count: 5, 5

[heater_fan heatbreak_cooling_fan]
pin: PC7
heater: extruder
heater_temp: 50.0

[fan]
pin: PC6

[firmware_retraction]
# PLACEHOLDER - starting values for a direct-drive extruder (Sprite Extruder
# Pro needs much shorter retraction than a bowden setup). Tune by testing for
# oozing/stringing vs. clogging the direct-drive gears; adjust with
# SET_RETRACTION at runtime before committing new values here.
retract_length: 0.5
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

[static_digital_output usb_pullup_enable]
pins: !PA14

[board_pins]
aliases:
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>
# EXP1_3 = TX1
# EXP1_4 = RST
# EXP1_5 = RX1



[temperature_sensor host]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp

######################################################################
# 128x64 Full Graphic Creality CR10 / ENDER 3 stockdisplay
######################################################################
#
# The Creality "12864" stock display uses a single ribbon cable to
# connect from the display's EXP3 plug and the mcu board's EXP1
# connector. This isn't really explained well in example Klipper
# configs and is more complicated because instead of the stock Creality
# 4.2.2 board I'm using the SKR-mini-e3 v2.0 board.
#
# The EXP1 -> EXP3 display connector looks like this:

#                 ┌───────────┬───────────┐
# Creality 4.2.2  │ EXP1_1      │ EXP1_2      │   SKR-mini-e3 v2
#            PC6  │ beeper      │ click       │   
#                 ├───────────┼───────────┤
#                 │ EXP1_3      │ EXP1_4      │
#            PB10 │ encoder     │ <unused>    │
#                 ├───────────┼───────────┤
#                 │ EXP1_5      │ EXP1_6      │
#            PB14 │ encoder     │ clock       │
#                 │             │ sclk_pin    │
#                 ├───────────┼───────────┤
#                 │ EXP1_7      │ EXP1_8      │
#            PB12 │ chip select │ data        │
#                 │ (cs_pin)    │ (sid_p      │
#                 ├───────────┼───────────┤
#                 │ EXP1_9      │ EXP1_10     │
#                 │ <GND>       │ VCC_5V      │
#                 └───────────┴───────────┘

# [display]
# FOR SKR MINI E3 V2
# lcd_type: st7920
# cs_pin: EXP1_4
# sclk_pin: EXP1_5
# sid_pin: EXP1_3
# encoder_pins: ^EXP2_3, ^EXP2_5
# click_pin: ^!EXP1_2

[display]
lcd_type: st7920
cs_pin: PB8
sclk_pin: PB9
sid_pin: PB15
encoder_pins: ^PA10, ^PA9
click_pin: ^!PA15

[pwm_cycle_time BEEPER_pin]
pin: EXP1_1          # Beeper pin (defined in board_pins aliases)
value: 0             # Silent at power on, set to 1 if active low.
shutdown_value: 0    # Disable at emergency shutdown (no PWM would be available anyway).
cycle_time: 0.001    # Default PWM frequency : 0.001 = 1ms will give a tone of 1kHz

[gcode_macro M300]
gcode:
    # Use a default 1kHz tone if S is omitted.
    {% set S = params.S|default(1000)|int %}
    # Use a 10ms duration is P is omitted.
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=BEEPER_pin VALUE=0.5 CYCLE_TIME={ 1.0/S if S > 0 else 1 }
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0

[idle_timeout]
;gcode:
; A list of G-Code commands to execute on an idle timeout. See docs/Command_Templates.md for G-Code format. The default is to run "TURN_OFF_HEATERS" and "M84".
timeout: 1800 ; Idle time (in seconds) to wait before running the above G-Code commands. The default is 600 seconds.


######################################################################
# Useful Macros, sourced from:
# - https://github.com/AleksaHeler/KlipperConfiguration
#
######################################################################

######################################################################
# Print start and end GCODEs
######################################################################

# In slicer we just call macros START_PRINT and END_PRINT when needed,
# then here we define the specific behaviour of the printer

[gcode_macro PRINT_START]
gcode:
  ; Called from the slicer as: PRINT_START EXTRUDER=<temp> BED=<temp>
  {% set BED_TEMP = params.BED|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER|default(210)|float %}
  {% set PROBE_TEMP = 150 %}
  SET_IDLE_TIMEOUT TIMEOUT=43200        ; 12h so a long pause won't drop motor positions
  M140 S{BED_TEMP}                      ; start bed heat (no wait)
  M104 S{PROBE_TEMP}                    ; nozzle to a no-ooze probing temp (no wait)
  M190 S{BED_TEMP}                      ; wait for bed - mesh at true print bed temp
  M109 S{PROBE_TEMP}                    ; wait for nozzle at probe temp before homing/meshing
  G28                                   ; home all
  G90                                   ; absolute coordinates
  M117 Meshing...
  BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5   ; native adaptive mesh; full mesh if slicer didn't label objects
  M117 Heating nozzle...
  M109 S{EXTRUDER_TEMP}                 ; now ramp to full print temp
  M117 Purging...
  G92 E0                                ; reset extruder
  G1 Z2.0 F3000                         ; lift to avoid scratching
  G1 X5 Y20 Z0.3 F5000                  ; move to purge start (inside 235x235)
  G1 X5 Y200 Z0.3 F1500 E15             ; first purge line
  G1 X5.4 Y200 Z0.3 F5000               ; nudge over
  G1 X5.4 Y20 Z0.3 F1500 E30            ; second purge line
  G92 E0                                ; reset extruder
  G1 Z3.0 F3000                         ; lift before print starts
  M117 Printing...

[gcode_macro PRINT_END]
gcode:
  ; Ender 3 Custom End G-code
  G4 ; Wait
  M220 S100 ; Reset Speed factor override percentage to default (100%)
  M221 S100 ; Reset Extrude factor override percentage to default (100%)
  G91 ; Set coordinates to relative
  G1 F1800 E-3 ; Retract filament 3 mm to prevent oozing
  G1 F3000 Z20 ; Move Z Axis up 20 mm to allow filament ooze freely
  G90 ; Set coordinates to absolute
  G1 X0 Y200 F2000 ; Move Heat Bed to the front for easy print removal
  M106 S0 ; Turn off cooling fan
  M104 S0 ; Turn off extruder
  M140 S0 ; Turn off bed
  M107 ; Turn off Fan
  M84 ; Disable stepper motors
  M300 S880 P100 ; Play some sound 
  G4 P50 ; Wait a bit
  M300 S880 P100 ; Play some sound 
  M117 Print finished!
  SET_IDLE_TIMEOUT TIMEOUT=1800 ; Set auto timeout back to 30min in case we heat printer up and forget
  ; End of custom end GCode

# [gcode_macro PRINT_PAUSE]
# gcode:

# [gcode_macro PRINT_RESUME]
# gcode:

[gcode_macro PID_EXTRUDER]
description: PID Tune for the Extruder
gcode:
  {% set TARGET_TEMP = params.TARGET_TEMP|default(240)|float %}
  PID_CALIBRATE HEATER=extruder TARGET={TARGET_TEMP}
  TURN_OFF_HEATERS
  SAVE_CONFIG

[gcode_macro PID_BED]
description: PID Tune for the Bed
gcode:
  {% set TARGET_TEMP = params.TARGET_TEMP|default(80)|float %}
  PID_CALIBRATE HEATER=heater_bed TARGET={TARGET_TEMP}
  TURN_OFF_HEATERS
  SAVE_CONFIG

######################################################################
# Filament Change
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[pause_resume]

[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state

# Cancel object (aka Marlin/RRF M486 commands) support
#
# Enable object exclusion
[exclude_object]

[gcode_macro M486]
gcode:
  # Parameters known to M486 are as follows:
  #   [C<flag>] Cancel the current object
  #   [P<index>] Cancel the object with the given index
  #   [S<index>] Set the index of the current object.
  #       If the object with the given index has been canceled, this will cause
  #       the firmware to skip to the next object. The value -1 is used to
  #       indicate something that isn’t an object and shouldn’t be skipped.
  #   [T<count>] Reset the state and set the number of objects
  #   [U<index>] Un-cancel the object with the given index. This command will be
  #       ignored if the object has already been skipped

  {% if 'exclude_object' not in printer %}
    {action_raise_error("[exclude_object] is not enabled")}
  {% endif %}

  {% if 'T' in params %}
    EXCLUDE_OBJECT RESET=1

    {% for i in range(params.T | int) %}
      EXCLUDE_OBJECT_DEFINE NAME={i}
    {% endfor %}
  {% endif %}

  {% if 'C' in params %}
    EXCLUDE_OBJECT CURRENT=1
  {% endif %}

  {% if 'P' in params %}
    EXCLUDE_OBJECT NAME={params.P}
  {% endif %}

  {% if 'S' in params %}
    {% if params.S == '-1' %}
      {% if printer.exclude_object.current_object %}
        EXCLUDE_OBJECT_END NAME={printer.exclude_object.current_object}
      {% endif %}
    {% else %}
      EXCLUDE_OBJECT_START NAME={params.S}
    {% endif %}
  {% endif %}

  {% if 'U' in params %}
    EXCLUDE_OBJECT RESET=1 NAME={params.U}
  {% endif %}

